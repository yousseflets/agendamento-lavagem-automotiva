<section class="hero">
  <div class="container">
    <h1>Agende sua Lavagem</h1>
    <p class="subtitle">Escolha o tipo de serviço que deseja</p>

    <div class="service-cards">
      <div class="svc-card" *ngFor="let s of services" (click)="openModal(s)">
        <div class="card-top">
          <div class="icon">
            <img [src]="s.image" [alt]="s.title" />
          </div>
        </div>
        <div class="card-bottom">
          <h3>{{ s.title }}</h3>
          <p>{{ s.description }}</p>
          <small class="small">Clique aqui e agende agora</small>
        </div>
      </div>
    </div>
  </div>
</section>

<app-booking-modal *ngIf="showModal && selectedService"
  [serviceName]="selectedService.title"
  (close)="closeModal()"
  (booked)="onBooked()">
</app-booking-modal>

<!-- Login prompt modal shown when attempting to book while not authenticated -->
<div class="login-prompt" *ngIf="showLoginPrompt">
  <div class="login-prompt-backdrop" (click)="closeLoginPrompt()"></div>
  <div class="login-prompt-card">
    <h3>Faça login</h3>
    <p>Você precisa estar logado para agendar. Faça login ou registre-se para continuar.</p>
    <div class="actions">
      <button class="btn primary" (click)="goToLogin()">Ir para Login</button>
      <button class="btn" (click)="closeLoginPrompt()">Cancelar</button>
    </div>
  </div>
</div>
