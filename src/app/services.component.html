<section class="hero">
  <div class="container">
    <h1>Agende sua Lavagem</h1>
    <p class="subtitle">Escolha o tipo de serviço que deseja</p>

    <div class="service-cards">
      <div class="svc-card" *ngFor="let s of services" (click)="openModal(s)">
        <div class="card-top">
          <div class="icon">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 11h18" stroke="#2b5c7a" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M7 11v6" stroke="#2b5c7a" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M17 11v6" stroke="#2b5c7a" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
        </div>
        <div class="card-bottom">
          <h3>{{ s.title }}</h3>
          <p>{{ s.description }}</p>
          <small class="small">Clique aqui e agende agora</small>
        </div>
      </div>
    </div>
  </div>
</section>

<app-booking-modal *ngIf="showModal && selectedService"
  [serviceName]="selectedService.title"
  (close)="closeModal()"
  (booked)="onBooked()">
</app-booking-modal>
